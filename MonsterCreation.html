<p id="announcedtext"> This is where announcements will come, very soon! </p> <br> 
<!-- the above is an editable text space where various announcements will go, usually what used to be the print command will end up here -->
<p id="monsterinfolist"> This is where info on your monsters will be! </p> <br> 
<input type="text" id="inputspace" /> 
<input type="button" id="inputdonebutton" value="Done Inputting!" />
<!-- the above is an input space and button, the button should trigger various things-->
<input type="button" id="startmonsterbutton" value="Create a New Monster" />

<script>
	const Monsterlist = [];
	const HitPointAmounts = [];
	const Abilities = {};
	const DiceAmounts = {};
	const DiceTypes = {};
	const ToHit = {};
	const DamageModifiers = {};

	// Below this will be let commands for various reused counter variables.
	let MonsterNumber = 0
	let AbilityNumber = 0
	let number = 0
	let CurrentAbilityNumber = 0
	let AbilityName = "Blank Placeholder"
	let DiceNumber = 0
	let DiceType = 0
	let HitBonus = 0
	let DamageBonus = 0


	// Below this are some rules.
	const OkDiceTypes = [4, 6, 8, 10, 12, 20]
	const yesAnswers = ["yes", "yeah", "y"];
    const noAnswers = ["no", "n"];

	// Below this is the functions, in chronological order.
	function new_monster_name_inquiry() {
		document.getElementById('announcedtext').textContent = "What will be the name of your monster?";
		document.getElementById('inputdonebutton').addEventListener('click', add_monster_name);
	}

	function add_monster_name() {
		Monsterlist.push (document.getElementById('inputspace').value.trim());
		document.getElementById('inputspace').value = "";
		Abilities[MonsterNumber] = [];
		DiceAmounts[MonsterNumber] = [];
		DiceTypes[MonsterNumber] = [];
		ToHit[MonsterNumber] = [];
		DamageModifiers[MonsterNumber] = [];
		hit_points_inquiry();
	}

	function hit_points_inquiry() {
		document.getElementById('announcedtext').textContent = "Thank you! Now, how many hit points will it have? Please keep it under 500.";
		document.getElementById('inputdonebutton').removeEventListener('click', add_monster_name);
		document.getElementById('inputdonebutton').addEventListener('click', note_hit_points);
	}

	function note_hit_points() {
		number = (document.getElementById('inputspace').value);
		HitPointNumber = Number(number);
		if (!Number.isInteger(HitPointNumber) || number.trim() === "") {
        	document.getElementById('announcedtext').textContent = "That's not an integer. How can you have that many hit points?";
        	document.getElementById('inputspace').value = "";
    	}
    	else if (HitPointNumber < 1) {
        	document.getElementById('announcedtext').textContent = "That's less than 1. How can you have that many hit points? Try higher!";
        	document.getElementById('inputspace').value = "";
		}
		else if (HitPointNumber > 500) {
        	document.getElementById('announcedtext').textContent = "That's too many. I can only handle up to 500.";
      		document.getElementById('inputspace').value = "";
		}
		else {
			document.getElementById('inputspace').value = "";
			HitPointAmounts.push (HitPointNumber);
			ability_number_inquiry();
		}
	}


	function ability_number_inquiry() {
		document.getElementById('announcedtext').textContent = "Thank you! Now, how many abilities will it have? Please keep it under ten.";
		document.getElementById('inputdonebutton').removeEventListener('click', note_hit_points);
		document.getElementById('inputdonebutton').addEventListener('click', note_ability_number);
	}

	function note_ability_number() {
		number = (document.getElementById('inputspace').value);
		AbilityNumber = Number(number);
		if (!Number.isInteger(AbilityNumber) || number.trim() === "") {
        	document.getElementById('announcedtext').textContent = "That's not an integer. How can you have that many abilities?";
        	document.getElementById('inputspace').value = "";
    	}
    	else if (AbilityNumber < 1) {
        	document.getElementById('announcedtext').textContent = "That's less than 1. How can you have that many abilities? Try higher!";
        	document.getElementById('inputspace').value = "";
		}
		else if (AbilityNumber > 10) {
        	document.getElementById('announcedtext').textContent = "That's too many. I can only handle up to 10.";
      		document.getElementById('inputspace').value = "";
		}
		else {
			document.getElementById('inputspace').value = "";
			document.getElementById('inputdonebutton').removeEventListener('click', note_ability_number); //this is here instead to prevent issues when removing the listeners multiple times later
			ability_name_inquiry();
		}
	}

	function ability_name_inquiry() {
		document.getElementById('announcedtext').textContent = "Thank you! Now, what will these " + AbilityNumber + " abilities be called? Input the name of number " + (CurrentAbilityNumber + 1);
		document.getElementById('inputdonebutton').addEventListener('click', add_ability_name);
	}

	function add_ability_name() {
		AbilityName = (document.getElementById('inputspace').value.trim());
		if (Abilities[MonsterNumber].includes(AbilityName) || AbilityName === ""){
			document.getElementById('announcedtext').textContent = "That's either a blank space or a duplicate name. Try again!";
        	document.getElementById('inputspace').value = "";
        }
        else {
        	Abilities[MonsterNumber].push(AbilityName);
        	document.getElementById('inputspace').value = "";
        	ability_dice_amount_inquiry();
        }
	}

	function ability_dice_amount_inquiry() {
		document.getElementById('announcedtext').textContent = "Thank you! Now, how many dice of damage will this deal? Keep it under 30 and use 0 for a nondamaging ability.";
		document.getElementById('inputdonebutton').removeEventListener('click', add_ability_name);
		document.getElementById('inputdonebutton').addEventListener('click', add_ability_dice_amount);
	}

	function add_ability_dice_amount() {
		number = (document.getElementById('inputspace').value);
		DiceNumber = Number(number);
		if (!Number.isInteger(DiceNumber) || number.trim() === "") {
        	document.getElementById('announcedtext').textContent = "That's not an integer. How can you have that many dice?";
        	document.getElementById('inputspace').value = "";
    	}
    	else if (DiceNumber < 0) {
        	document.getElementById('announcedtext').textContent = "That's less than 0. How can you have negative dice? Try higher!";
        	document.getElementById('inputspace').value = "";
		}
		else if (DiceNumber > 30) {
        	document.getElementById('announcedtext').textContent = "That's too many. I can only handle up to 30.";
      		document.getElementById('inputspace').value = "";
		}
		else {
			document.getElementById('inputspace').value = "";
			DiceAmounts[MonsterNumber].push(DiceNumber);
			dice_type_inquiry();
		}
	}

	function dice_type_inquiry() {
		document.getElementById('announcedtext').textContent = "Thank you! Now, what type of die (4, 6, 8, 10, 20) will those be? Use any if you already stated that it deals no damage.";
		document.getElementById('inputdonebutton').removeEventListener('click', add_ability_dice_amount);
		document.getElementById('inputdonebutton').addEventListener('click', add_ability_dice_type);
	}

	function add_ability_dice_type() {
		number = (document.getElementById('inputspace').value);
		DiceType = Number(number);
		if (!OkDiceTypes.includes(DiceType)) {
			document.getElementById('announcedtext').textContent = "There is no die with that many sides. Try again!";
        	document.getElementById('inputspace').value = "";
        }
        else {
        	document.getElementById('inputspace').value = "";
			DiceTypes[MonsterNumber].push(DiceType);
			to_hit_inquiry();
		}
	}

	function to_hit_inquiry() {
		document.getElementById('announcedtext').textContent = "Thank you! Now, what is the to hit bonus for this ability? Use 0 if you already stated that it deals no damage.";
		document.getElementById('inputdonebutton').removeEventListener('click', add_ability_dice_type);
		document.getElementById('inputdonebutton').addEventListener('click', add_to_hit);
	}

	function add_to_hit() {
		number = (document.getElementById('inputspace').value);
		HitBonus = Number(number);
		if (!Number.isInteger(HitBonus) || number.trim() === "") {
        	document.getElementById('announcedtext').textContent = "That's not an integer. How can you have that bonus?";
        	document.getElementById('inputspace').value = "";
    	}
		else if (HitBonus > 15) {
        	document.getElementById('announcedtext').textContent = "That's too much. Your players and I can only handle up to 15.";
      		document.getElementById('inputspace').value = "";
		}
		else {
			document.getElementById('inputspace').value = "";
			ToHit[MonsterNumber].push(HitBonus);
			damage_bonus_inquiry();
		}
	}

	function damage_bonus_inquiry() {
		document.getElementById('announcedtext').textContent = "Thank you! Now, what is the damage bonus for this ability? Use 0 if you already stated that it deals no damage, or something else if it always deals a set amount (paired with no dice).";
		document.getElementById('inputdonebutton').removeEventListener('click', add_to_hit);
		document.getElementById('inputdonebutton').addEventListener('click', add_damage_bonus);
	}

	function add_damage_bonus() {
		number = (document.getElementById('inputspace').value);
		DamageBonus = Number(number);
		if (!Number.isInteger(DamageBonus) || number.trim() === "") {
        	document.getElementById('announcedtext').textContent = "That's not an integer. How can you have that bonus?";
        	document.getElementById('inputspace').value = "";
    	}
		else if (DamageBonus > 100) {
        	document.getElementById('announcedtext').textContent = "That's too much. Your players and I can only handle up to 100.";
      		document.getElementById('inputspace').value = "";
		}
		else {
			document.getElementById('inputspace').value = "";
			DamageModifiers[MonsterNumber].push(DamageBonus);
			is_it_enough();
		}
	}

	function is_it_enough() {
		CurrentAbilityNumber = CurrentAbilityNumber + 1
		document.getElementById('inputdonebutton').removeEventListener('click', add_damage_bonus);
		if (CurrentAbilityNumber <= AbilityNumber) {
			ability_name_inquiry()
		}
		else {
			CurrentAbilityNumber = 0
        	document.getElementById('announcedtext').textContent = "Perfect! The monster named " + Monsterlist[MonsterNumber] + " is complete!";
			MonsterNumber = MonsterNumber + 1;
		}
	}
</script>
