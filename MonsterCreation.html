<!DOCTYPE html> <!-- That's to help the browser -->
<p id="announcedtext"> This is where announcements will come, very soon! </p> <br> 
<!-- the above is an editable text space where various announcements will go, usually what used to be the print command will end up here -->
<p id="debugtext"> This is where debugging stuff ends up :) </p> <br> 
<p id="monsterinfolist"> This is where info on your monsters will be! </p> <br> 
<input type="text" id="inputspace" /> 
<input type="button" id="inputdonebutton" value="Done Inputting!" />
<!-- the above is an input space and button, the button should trigger various things-->
<input type="button" id="startmonsterbutton" value="Create a New Monster" />
<!-- The above button triggers the new monster creation sequence -->
<input type="button" id="startbattlebutton" value="Start Battle!" />
<!-- That button starts combat! -->
<div id="combatZone"></div>
<!-- This is a zone where the combat stuff will go eventually -->
<div id="combatAttackZone"></div>
<!-- This is where monster attacks are noted -->


<script> //crucial functions
	const yesAnswers = ["yes", "yeah", "y"];
    const noAnswers = ["no", "n"];

 	const inputText = document.getElementById('inputspace')
 	const announcedText = document.getElementById('announcedtext')
 	const inputButton = document.getElementById('inputdonebutton')

	function random(min, max) {
	  const low = Math.ceil(min);
	  const high = Math.floor(max);
	  return Math.floor(Math.random() * (high - low + 1)) + low;
	}

 	function check_yes_or_no_answers() {
 		const VariableName = inputText.value.toLowerCase();

 		if (yesAnswers.includes(VariableName)) {
 			announcedText.textContent = "You said yes."; 
        	return true; 
    	} 
    	if (noAnswers.includes(VariableName)) {
    		announcedText.textContent = "You said no."; 
        	return false;
        }
        else {
		announcedText.textContent = "Please enter a valid answer.";
		}
		inputButton.removeEventListener('click', check_yes_or_no_answers);
	}

 	function yes_or_no(ToBePrintedQuestion) {
		announcedText.textContent = ToBePrintedQuestion;
		inputButton.addEventListener('click', check_yes_or_no_answers);
	}

	function check_answer(min, max, text) {
			number = (inputText.value);
			const value = Number(number);
			if (!Number.isInteger(value) || number.trim() === "") {
	        	announcedText.textContent = "That's not an integer. How can you have that " + text + "?";
	        	inputText.value = "";
	        	return null;
	    	}
			if (value > max) {
	        	announcedText.textContent = "That's too much. I can only handle up to " + max + ".";
	      		inputText.value = "";
	      		return null;
			}
			if (value < min) {
        		announcedText.textContent = "That's less than " + min + ". How can you have that " + text + "? Try higher!";
        		inputText.value = "";
        		return null;
        	}
			inputText.value = "";
			return value
		}
	
</script>

<script> // This one is the creation system part ok?
	const Monsterlist = [];
	const HitPointAmounts = [];
	const Abilities = [];
	const DiceAmounts = [];
	const DiceTypes = [];
	const ToHit = [];
	const DamageModifiers = [];
	const MonsterBattleQuantities = []

	// Below this will be let commands for various reused counter variables.
	let MonsterNumber = 0;
	let AbilityNumber = 0;
	let number = 0;
	let CurrentAbilityNumber = 0;
	let MonsterChosenId = 0;

	// Below this are some rules.
	const OkDiceTypes = [4, 6, 8, 10, 12, 20];

	document.getElementById('startmonsterbutton').addEventListener('click', new_monster_name_inquiry);

	// Below this is the functions, in chronological order.
	function new_monster_name_inquiry() {
		document.getElementById('startmonsterbutton').removeEventListener('click', new_monster_name_inquiry);
		announcedText.textContent = "What will be the name of your monster?";
		inputButton.addEventListener('click', add_monster_name);
	}

		function add_monster_name() {
			Monsterlist.push (inputText.value.trim());
			inputText.value = "";
			Abilities[MonsterNumber] = [];
			DiceAmounts[MonsterNumber] = [];
			DiceTypes[MonsterNumber] = [];
			ToHit[MonsterNumber] = [];
			DamageModifiers[MonsterNumber] = [];
			MonsterBattleQuantities.push(0);
			inputButton.removeEventListener('click', add_monster_name);
			hit_points_inquiry();
		}

	function hit_points_inquiry() {
		announcedText.textContent = "Thank you! Now, how many hit points will it have? Please keep it under 500.";
		inputButton.addEventListener('click', note_hit_points);
	}

		function note_hit_points() {
			const HitPointNumber = check_answer(1, 500, "many hit points");
			if (HitPointNumber === null) return;
			HitPointAmounts.push (HitPointNumber);
			inputButton.removeEventListener('click', note_hit_points);
			ability_number_inquiry();
		}


	function ability_number_inquiry() {
		announcedText.textContent = "Thank you! Now, how many abilities will it have? Please keep it under ten.";
		inputButton.addEventListener('click', note_ability_number);
	}

		function note_ability_number() {
			AbilityNumber = check_answer(1, 10, "many abilities");
			if (AbilityNumber === null) return;
			inputButton.removeEventListener('click', note_ability_number);
			ability_name_inquiry();
		}

	function ability_name_inquiry() {
		announcedText.textContent = "Thank you! Now, what will these " + AbilityNumber + " abilities be called? Input the name of number " + (CurrentAbilityNumber + 1);
		inputButton.addEventListener('click', add_ability_name);
	}

		function add_ability_name() {
			const AbilityName = (inputText.value.trim());
			if (Abilities[MonsterNumber].includes(AbilityName) || AbilityName === ""){
				announcedText.textContent = "That's either a blank space or a duplicate name. Try again!";
	        	inputText.value = "";
	        }
	        else {
	        	Abilities[MonsterNumber].push(AbilityName);
	        	inputText.value = "";
	        	inputButton.removeEventListener('click', add_ability_name);
	        	ability_dice_amount_inquiry();
	        }
		}

	function ability_dice_amount_inquiry() {
		announcedText.textContent = "Thank you! Now, how many dice of damage will this deal? Keep it under 30 and use 0 for a nondamaging ability.";
		inputButton.addEventListener('click', add_ability_dice_amount);
	}

		function add_ability_dice_amount() {
			const DiceNumber = check_answer(0, 30, "many dice");
			if (DiceNumber === null) return;
			DiceAmounts[MonsterNumber].push (DiceNumber);
			inputButton.removeEventListener('click', add_ability_dice_amount);
			dice_type_inquiry();
		}

	function dice_type_inquiry() {
		announcedText.textContent = "Thank you! Now, what type of die (4, 6, 8, 10, 12, 20) will those be? Use any if you already stated that it deals no damage.";
		inputButton.addEventListener('click', add_ability_dice_type);
	}

		function add_ability_dice_type() {
			number = (inputText.value);
			const DiceType = Number(number);
			if (!OkDiceTypes.includes(DiceType)) {
				announcedText.textContent = "There is no die with that many sides. Try again!";
	        	inputText.value = "";
	        }
	        else {
	        	inputText.value = "";
				DiceTypes[MonsterNumber].push(DiceType);
				inputButton.removeEventListener('click', add_ability_dice_type);
				to_hit_inquiry();
			}
		}

	function to_hit_inquiry() {
		announcedText.textContent = "Thank you! Now, what is the to hit bonus for this ability? Use 0 if you already stated that it deals no damage.";
		inputButton.addEventListener('click', add_to_hit);
	}

		function add_to_hit() {
			const HitBonus = check_answer(0, 50, "to hit bonus");
			if (HitBonus === null) return;
			ToHit[MonsterNumber].push (HitBonus);
			inputButton.removeEventListener('click', add_to_hit);
			damage_bonus_inquiry();
		}

	function damage_bonus_inquiry() {
		announcedText.textContent = "Thank you! Now, what is the damage bonus for this ability? Use 0 if you already stated that it deals no damage, or something else if it always deals a set amount (paired with no dice).";
		inputButton.addEventListener('click', add_damage_bonus);
	}

		function add_damage_bonus() {
			const DamageBonus = check_answer(0, 50, "damage bonus");
			if (DamageBonus === null) return;
			DamageModifiers[MonsterNumber].push (DamageBonus);
			inputButton.removeEventListener('click', add_damage_bonus);
			is_it_enough();
		}

	function is_it_enough() {
		CurrentAbilityNumber = CurrentAbilityNumber + 1;
		if (CurrentAbilityNumber < AbilityNumber) {
			ability_name_inquiry();
		}
		else {
			CurrentAbilityNumber = 0
        	announcedText.textContent = "Perfect! The monster named " + Monsterlist[MonsterNumber] + " is complete!";
			MonsterNumber = MonsterNumber + 1;
			document.getElementById('startmonsterbutton').addEventListener('click', new_monster_name_inquiry);
		}
	}
</script>

<script>
	const FullMonsterList = [];
	const CurrentHitpointAmounts = [];
	const activeMonsters = []

	let ThisMonsterAmount = 0;
	let CurrentMonsterName = "Blank Placeholder";
	let TotalMonsterAmount = 0;
	let RoundCount = 1;
	let attackText = "";
	let Abilityusednumbers = 0;
	let variablename = 0;
	let baseattackroll = 0;
	let attackroll = 0;
	let basedamage = 0;
	let anothervariablename = 0;
	let damage = 0;
	let chosenMonster = "Blank Placeholder"
	let chosen = "Blank Placeholder" //this one is the index of the chosen monster i thinkkk
	let listText = ""


	let critHit = false;
	let critFail = false;

	let combatMode = "AddingMonsters"

	document.getElementById('startbattlebutton').addEventListener('click', battle_sequence);

	function toggle_mode() {
	    if (combatMode === "AddingMonsters") {
	        combatMode = "Damage";
	        this.value = "Switch to Add Mode";
	    }
	    else {
	        combatMode = "AddingMonsters";
	        this.value = "Switch to Damage Mode";
	    }
	}

	function monster_selected() {
		if (combatMode === "AddingMonsters") {
			monster_added.call(this);
		}
		else if (combatMode === "Damage") {
			monster_damaged.call(this)
		}
	}

	function monster_added() { //this function adds 1 to the monster's spot in the quantities list
		MonsterChosenId = this.monsterIndex;
		MonsterBattleQuantities[MonsterChosenId] = MonsterBattleQuantities[MonsterChosenId] + 1;
		CurrentMonsterName = Monsterlist[MonsterChosenId] + MonsterBattleQuantities[MonsterChosenId];
		FullMonsterList.push(CurrentMonsterName); //change this to be at the right spot
		CurrentHitpointAmounts.push(HitPointAmounts[MonsterChosenId]); //change this to be at the right spot
		refresh_monster_list();
	}

		function refresh_monster_list() {
			listText = "<strong>Active Monsters in Battle:</strong><br>"; //set the heading
				for (let g = 0; g < Monsterlist.length; g++) {
					const name = Monsterlist[g];
					const quantity = MonsterBattleQuantities[g];

					if (quantity > 0) {
						listText = listText + name + " x" + quantity + "<br>";
					}
				}
			document.getElementById('MonsterTally').innerHTML = listText;
		}

	function monster_damaged() {
		MonsterChosenId = this.monsterIndex;
		activeMonsters.splice(0);
		for (let i = 0; i < FullMonsterList.length; i++) { //check the whole list
			if (FullMonsterList[i].startsWith(Monsterlist[MonsterChosenId])) { //find the ones that start with what we nees
		        let number = FullMonsterList[i].slice(Monsterlist[MonsterChosenId].length); //slice off the name
		        activeMonsters.push({
		        	number: number,
		        	index: i
		        });
    		}
		}
		announcedText.textContent = "Ok! Which " + Monsterlist[MonsterChosenId] + " was damaged? Your options are:" + activeMonsters.map(monster => monster.number).join(" / ");
		inputButton.addEventListener('click', finding_monster);
	}

		function finding_monster() {
			chosenMonster = (inputText.value);
			chosen = activeMonsters.find(monster => monster.number === chosenMonster); //checking the whole thing to see if one of the numbers is the one they inputted
			if (!chosen) {
				announcedText.textContent = "There is no " + Monsterlist[MonsterChosenId] + " with that number, please try again!";
	        	inputText.value = "";
	        }
	        else {
	        	inputText.value = "";
				inputButton.removeEventListener('click', finding_monster);
				ask_for_damage_taken()
			}
		}

		function ask_for_damage_taken() {
			announcedText.textContent = "Thank you! Now, how much damage did it take? Keep it under 600, please!";
			inputButton.addEventListener('click', deal_damage);
		}
			function deal_damage() {
				const DamageTaken = check_answer(1, 600, "damage");
				if (DamageTaken === null) return;
				inputButton.removeEventListener('click', deal_damage);
				CurrentHitpointAmounts[chosen.index] -= DamageTaken;
				if (CurrentHitpointAmounts[chosen.index] <= 0) {
					announcedText.textContent = "Thank you! " + Monsterlist[MonsterChosenId] + chosenMonster + " is dead now!";
					FullMonsterList.splice(chosen.index, 1);
					CurrentHitpointAmounts.splice(chosen.index, 1);
					MonsterBattleQuantities[MonsterChosenId] -= 1
				}
			}

	function combat_over(){
		document.getElementById('startbattlebutton').addEventListener('click', battle_sequence);
		document.getElementById('startmonsterbutton').addEventListener('click', new_monster_name_inquiry);
		document.getElementById("combatZone").innerHTML = ""; //empty the zone
    	document.getElementById("combatAttackZone").innerHTML = ""; //empty the zone
    	announcedText.textContent = "Combat over!";
	}

	function round_of_attacks() {
		attackText = "";
		TotalMonsterAmount = FullMonsterList.length;

		for (let h = 0; h < Monsterlist.length; h++) {
			attackText = attackText + "Attacks of the " + MonsterBattleQuantities[h] + Monsterlist[h] + "s" + "<br>"; //declare the attacking group
			ThisMonsterAmount = MonsterBattleQuantities[h];
			for (let j = 0; j < ThisMonsterAmount; j++) {
				variablename = Abilities[h].length; //get the number of abilities
				Abilityusednumbers = random(0, variablename - 1);
				baseattackroll = random(1, 20);
				critHit = false;
				critFail = false;
				if (baseattackroll === 20) {
					critHit = true;
				}
				if (baseattackroll === 1) {
					critFail = true;
				}
				attackroll = baseattackroll + ToHit[h][Abilityusednumbers];
				basedamage = 0;
				anothervariablename = DiceTypes[h][Abilityusednumbers];
				for (let k = 0; k < DiceAmounts[h][Abilityusednumbers]; k++) {
					basedamage = basedamage + random(1, anothervariablename);
				}
				damage = basedamage + DamageModifiers[h][Abilityusednumbers];
				attackText = attackText + Monsterlist[h] + (j + 1) + " attacked and dealt " + damage + " damage, with a to hit roll of " + attackroll + ".";
				if (critHit === true) {
					attackText = attackText + " This was a crit hit.";
				}
				if (critFail === true) {
					attackText = attackText + " This was a crit miss.";
				}
				attackText = attackText + "<br>";
			}
		}
		document.getElementById('AttacksDisplay').innerHTML = attackText;
	}

	function battle_sequence() {
		document.getElementById('startbattlebutton').removeEventListener('click', battle_sequence);
		document.getElementById('startmonsterbutton').removeEventListener('click', new_monster_name_inquiry);
    	announcedText.textContent = "Let's prep for combat! A bunch of buttons will appear. Just click them to indicate a new monster! You can also add a new one anytime!";
    	document.getElementById("combatZone").innerHTML = ""; //empty the zone
    	document.getElementById("combatAttackZone").innerHTML = ""; //empty the zone

    	const monsterCounter = document.createElement("p"); //make a paragraph
    	combatZone.appendChild(monsterCounter); //put it in the zone
    	monsterCounter.id = "MonsterTally"; //give it its id  

    	const attacksCounter = document.createElement("p"); //make a paragraph
    	combatAttackZone.appendChild(attacksCounter); //put it in the zone
    	attacksCounter.id = "AttacksDisplay"; //id it

    	for (let i = 0; i < Monsterlist.length; i++) { //ready a loop, set i to 0, go until it reaches the length, add 1 each time
    		const monsterButton = document.createElement("input");
    		monsterButton.type = "button";
			monsterButton.id = "monster" + i + "button";
    		monsterButton.value = Monsterlist[i];
    		monsterButton.monsterIndex = i;
    		combatZone.appendChild(monsterButton); //put it in the zone
    		monsterButton.addEventListener('click', monster_selected);
    		//that loop sets up a button
    	}
    	const roundstartbutton = document.createElement("input");
		roundstartbutton.type = "button";
		roundstartbutton.id = "StartsARound";
    	roundstartbutton.value = "Begin a round of attacks!"; 
    	combatZone.appendChild(roundstartbutton);
    	document.getElementById('StartsARound').addEventListener('click', round_of_attacks); //setting up a button that starts a round

    	const combatendbutton = document.createElement("input");
		combatendbutton.type = "button";
		combatendbutton.id = "EndCombat";
    	combatendbutton.value = "End combat mode!"; 
    	combatZone.appendChild(combatendbutton);
    	document.getElementById('EndCombat').addEventListener('click', combat_over); //setting up a button that ends battle

    	const togglemodebutton = document.createElement("input");
		togglemodebutton.type = "button";
		togglemodebutton.id = "ChangesMode";
    	togglemodebutton.value = "Switch to Damage Mode"; 
    	combatZone.appendChild(togglemodebutton);
    	togglemodebutton.addEventListener('click', toggle_mode); //setting up a button that changes the mode of the other buttons
	}
</script>
